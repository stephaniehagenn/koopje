name: Daily Price Scraper

on:
  # Run every day at 6:00 AM UTC (7:00/8:00 AM in Netherlands)
  schedule:
    - cron: '0 6 * * *'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
  
  # Run on push to main for testing
  push:
    branches: [ main ]
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
    
    - name: 🕷️ Run scraper
      run: |
        python scraper_main.py
      env:
        PYTHONPATH: ${{ github.workspace }}
    
    - name: 📊 Check if data changed
      id: check_changes
      run: |
        if git diff --quiet api/data/products.json; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No price changes detected"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Price changes detected!"
        fi
    
    - name: 💾 Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.name "Price Scraper Bot"
        git config --local user.email "action@github.com"
        git add api/data/products.json
        git commit -m "🤖 Auto-update prices - $(date +'%Y-%m-%d %H:%M:%S')"
        git push
    
    - name: 📧 Send notification on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_APP_PASSWORD }}
        subject: "⚠️ Price Scraper Failed"
        body: |
          The daily price scraper failed to complete.
          
          Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Date: $(date)
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: Price Scraper Bot <noreply@github.com>
        
    - name: 📤 Upload artifact (for debugging)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-logs
        path: |
          scraper.log
          api/data/products.json
        retention-days: 7
    
    - name: ✅ Scrape completed
      if: success()
      run: |
        echo "✅ Scraping completed successfully!"
        echo "Timestamp: $(date)"
        if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
          echo "📊 Price data updated"
        else
          echo "📊 No price changes"
        fi
